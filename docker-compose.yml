# docker-compose.yml — The ignition sequence.
#
# One service, one volume, one port. Set PB_ADMIN_EMAIL and
# PB_ADMIN_PASSWORD in your environment or a .env file,
# then `docker compose up --build` and walk away.

services:
  forria64:
    build: .
    ports:
      - "8090:8090"
    volumes:
      - pb_data:/pb_data
    environment:
      - PB_ADMIN_EMAIL=${PB_ADMIN_EMAIL}
      - PB_ADMIN_PASSWORD=${PB_ADMIN_PASSWORD}
    restart: unless-stopped

volumes:
  pb_data:
